---
layout: examples
title: Headers
extra_css:
- "headers.css"
---

<main>
  <h1 class="visually-hidden">Headers examples</h1>

  <header class="header header-page-menu-opened-init" id="header" style="z-index: 1029" data-of-header>
    <div class="container">
      <div class="header-brand">
        <a href="#">
          <img alt="Logo" width="200" height="60"
               src="data:image/svg+xml,%3Csvg%20style='font-size:%201.125rem;%20font-family:system-ui,-apple-system,%22Segoe%20UI%22,Roboto,%22Helvetica%20Neue%22,%22Noto%20Sans%22,%22Liberation%20Sans%22,Arial,sans-serif,%22Apple%20Color%20Emoji%22,%22Segoe%20UI%20Emoji%22,%22Segoe%20UI%20Symbol%22,%22Noto%20Color%20Emoji%22;%20-webkit-user-select:%20none;%20-moz-user-select:%20none;%20user-select:%20none;%20text-anchor:%20middle;'%20width='200'%20height='60'%20xmlns='http://www.w3.org/2000/svg'%3E%3Ctitle%3EPlaceholder%3C/title%3E%3Crect%20width='100%25'%20height='100%25'%20fill='%23868e96'%3E%3C/rect%3E%3Ctext%20x='50%25'%20y='50%25'%20fill='%23dee2e6'%20dy='.3em'%3ELogo%3C/text%3E%3C/svg%3E">
        </a>
      </div>
      <div class="header-content">
        <div class="d-none d-lg-block">
          <div class="dropdown">
            <button class="header-link" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              <span class="header-link-icon">{{< icon name="person-circle" >}}</span>
              <span class="header-link-text">Account</span>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Login</a></li>
              <li><a class="dropdown-item" href="#">Register</a></li>
            </ul>
          </div>
        </div>
        <div class="d-none d-lg-block">
          <div class="dropdown">
            <button class="header-link" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              <span class="header-link-icon">{{< icon name="cart-fill" >}}</span>
              <span class="header-link-text">Cart</span>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Overview</a></li>
              <li><a class="dropdown-item" href="#">Checkout</a></li>
            </ul>
          </div>
        </div>
        <div class="d-none d-lg-block">
          <div class="dropdown">
            <button class="header-link" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              <span class="header-link-icon">
                {{< icon name="heart-fill" >}}
                <span class="header-link-icon-badge">
                  <span class="badge bg-danger">12</span>
                </span>
              </span>
              <span class="header-link-text">Favorites</span>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Next Trip</a></li>
              <li><a class="dropdown-item" href="#">Xmas Dinner</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item" href="#">Edit Favorites</a></li>
            </ul>
          </div>
        </div>
        <div>
          <div class="dropdown">
            <button class="header-link" type="button" data-bs-toggle="dropdown" aria-expanded="false">
              <span class="header-link-icon">{{< icon name="translate" >}}</span>
              <span class="header-link-text">Language</span>
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">German</a></li>
              <li><a class="dropdown-item" href="#">English</a></li>
              <li><a class="dropdown-item" href="#">French</a></li>
            </ul>
          </div>
        </div>
        <div class="d-none d-lg-block">
          <button class="header-link" data-bs-toggle="collapse" data-bs-target="#headerSearch"
                  aria-controls="headerSearch"
                  aria-expanded="false" aria-label="Toggle header search">
            <span class="header-link-icon d-none-collapsed">{{< icon name="search" >}}</span>
            <span class="header-link-icon d-block-collapsed">{{< icon name="x-lg" >}}</span>
            <span class="header-link-text">Search</span>
          </button>
          <div class="collapse header-collapse header-search-wrapper" id="headerSearch">
            <div class="container">
              <div class="header-search">
                <form class="search-form search-form-lg">
                  <div class="search-form-inputs">
                    <input type="search" name="keywords" placeholder="Keywords" aria-label="Keywords">
                    <button type="submit">
                      {{< icon name="search" >}}
                      <span class="visually-hidden">Search</span>
                    </button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
        <div class="show-when-mobile-menu-opened">
          <button class="header-link" type="button" data-bs-toggle="collapse"
                  data-of-collapse-toggle-class='{"className": "header-page-menu-opened", "targetSelector": "#header"}'
                  data-bs-target="#pageMenu" aria-controls="pageMenu"
                  aria-expanded="false" aria-label="Toggle navigation">
            <span class="header-link-icon d-none-collapsed">{{< icon name="list" >}}</span>
            <span class="header-link-icon d-block-collapsed">{{< icon name="x-lg" >}}</span>
            <span class="header-link-text">Menu</span>
          </button>

          <div class="collapse header-collapse page-menu-wrapper" id="pageMenu">
            <div class="container">
              {{< page-menu-type-mobile >}}
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>
  {{< section-banner >}}
</main>
